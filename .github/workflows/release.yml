name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT: src/memctl/memctl.csproj
  RELEASE_REPO: vdg-solutions/memctl-releases

jobs:
  verify-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Compare tag/csproj/plugin versions
        shell: bash
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          BASE_VER="${TAG_VER%%-*}"
          CSPROJ_VER=$(grep -oE '<Version>[^<]+' src/memctl/memctl.csproj | sed 's|<Version>||')
          PLUGIN_VER=$(python3 -c "import json; print(json.load(open('plugins/memctl-claude/.claude-plugin/plugin.json'))['version'])")

          echo "tag=$TAG_VER base=$BASE_VER csproj=$CSPROJ_VER plugin=$PLUGIN_VER"

          if [ "$CSPROJ_VER" != "$BASE_VER" ]; then
            echo "::error::csproj <Version> $CSPROJ_VER != tag base $BASE_VER"; exit 1
          fi
          if [ "$PLUGIN_VER" != "$BASE_VER" ]; then
            echo "::error::plugin.json version $PLUGIN_VER != tag base $BASE_VER"; exit 1
          fi
          echo "::notice::version sync verified — $BASE_VER"

  build:
    needs: verify-versions
    name: build-${{ matrix.rid }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, rid: win-x64,   ext: .exe, archive: zip }
          - { os: ubuntu-latest,  rid: linux-x64, ext: '',   archive: tar }
          - { os: macos-latest,   rid: osx-arm64, ext: '',   archive: tar }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore ${{ env.PROJECT }}

      - name: Publish AOT
        shell: bash
        run: |
          dotnet publish "${{ env.PROJECT }}" \
            -c Release \
            -r ${{ matrix.rid }} \
            -p:PublishAot=true \
            -p:DebugType=none \
            -p:DebugSymbols=false \
            -p:StripSymbols=true \
            -o publish

      - name: Package
        shell: bash
        env:
          RID: ${{ matrix.rid }}
          EXT: ${{ matrix.ext }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          VER="${GITHUB_REF_NAME#v}"
          mkdir -p package
          cp "publish/memctl${EXT}" package/
          if [ "$ARCHIVE" = "zip" ]; then
            for lib in onnxruntime.dll e_sqlite3.dll onnxruntime_providers_shared.dll; do
              [ -f "publish/$lib" ] && cp "publish/$lib" package/
            done
          else
            find publish \( -name "*.so" -o -name "*.dylib" \) -exec cp {} package/ \;
          fi
          cp docs/memctl.md package/SKILL.md
          [ -f README.md ] && cp README.md package/ || true
          [ -f LICENSE ] && cp LICENSE package/ || true
          if [ "$ARCHIVE" = "zip" ]; then
            (cd package && 7z a -tzip "../memctl-${RID}-${VER}.zip" * >/dev/null)
          else
            tar -C package -czf "memctl-${RID}-${VER}.tar.gz" .
          fi
          ls -la memctl-${RID}-${VER}.*

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: memctl-${{ matrix.rid }}
          path: |
            memctl-${{ matrix.rid }}-*.zip
            memctl-${{ matrix.rid }}-*.tar.gz
          retention-days: 7
          if-no-files-found: error

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts

      - name: Stage release files
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.zip' -o -name '*.tar.gz' \) -exec cp {} release/ \;
          ls -la release/

      - name: Generate release notes
        shell: bash
        run: |
          PREV=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || git rev-list --max-parents=0 HEAD)
          {
            echo "## Changes"
            echo
            git log "${PREV}..${GITHUB_REF_NAME}" --pretty=format:'- %s' | head -100
          } > release-notes.md
          cat release-notes.md

      - name: Publish to release repo
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPO_PAT }}
        shell: bash
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${{ env.RELEASE_REPO }}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            release/*

      - name: Sync plugin source + top-level SKILL.md to release repo
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPO_PAT }}
        shell: bash
        run: |
          set -euo pipefail
          REL=/tmp/release-repo
          rm -rf "$REL"
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${RELEASE_REPO}.git" "$REL"

          # Sync plugin source (overwrite directory)
          rm -rf "$REL/plugins/memctl-claude"
          mkdir -p "$REL/plugins"
          cp -r plugins/memctl-claude "$REL/plugins/"

          # docs/memctl.md is the single source of truth for the skill doc.
          # Overwrite the plugin copy so both locations in the release repo stay identical.
          cp docs/memctl.md "$REL/SKILL.md"
          cp docs/memctl.md "$REL/plugins/memctl-claude/skills/memctl/SKILL.md"

          # Sync online install scripts
          cp install.sh "$REL/install.sh"
          cp Install.ps1 "$REL/Install.ps1"

          cd "$REL"
          git config user.email "actions@github.com"
          git config user.name "release-pipeline"
          git add plugins/memctl-claude SKILL.md install.sh Install.ps1
          if git diff --staged --quiet; then
            echo "::notice::plugin + skill unchanged, skip sync"
            exit 0
          fi
          git commit -m "chore: sync plugin + skill to ${GITHUB_REF_NAME}"
          git push
          echo "::notice::plugin + skill synced to ${GITHUB_REF_NAME}"

  sync-marketplace:
    needs: release
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Update marketplace.json plugin entry
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPO_PAT }}
        shell: bash
        run: |
          set -euo pipefail
          VER="${GITHUB_REF_NAME#v}"
          REPO="vdg-solutions/claude-plugins"
          API="https://api.github.com/repos/$REPO/contents/.claude-plugin/marketplace.json"

          curl -fsSL -H "Authorization: token $GH_TOKEN" "$API" -o /tmp/cur.json
          SHA=$(python3 -c "import json; print(json.load(open('/tmp/cur.json'))['sha'])")
          python3 <<PYEOF
          import json, base64, sys
          d = json.load(open('/tmp/cur.json'))
          mp = json.loads(base64.b64decode(d['content']).decode())
          changed = False
          for p in mp['plugins']:
              if p['name'] == 'memctl' and p.get('version') != '$VER':
                  p['version'] = '$VER'
                  changed = True
          if not changed:
              print('marketplace already at $VER, skip', file=sys.stderr)
              sys.exit(0)
          open('/tmp/new.json', 'w').write(json.dumps(mp, indent=2) + '\n')
          PYEOF
          if [ ! -f /tmp/new.json ]; then
            echo "::notice::marketplace already at $VER, no update needed"
            exit 0
          fi

          B64=$(base64 -w 0 /tmp/new.json)
          PAYLOAD=$(printf '{"message":"chore: bump memctl plugin to %s","content":"%s","sha":"%s"}' "$VER" "$B64" "$SHA")
          curl -fsSL -X PUT -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "$API" -d "$PAYLOAD" -o /tmp/resp.json
          grep -q '"content"' /tmp/resp.json
          echo "::notice::marketplace.json bumped to $VER"
